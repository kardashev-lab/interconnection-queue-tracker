name: Fetch ISO queuess

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-queues
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/fetcher/requirements.txt

      - name: Install fetcher dependencies
        run: pip install -r services/fetcher/requirements.txt

      - name: Fetch all ISO/RTO queues
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FETCH_MARKETS: ERCOT,MISO,PJM,CAISO,SPP,NYISO,ISO-NE
        run: python services/fetcher/fetch.py
